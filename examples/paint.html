<!doctype html>
<!--
  Paint app demo for ink-wasm.

  A small but complete painting application: a color palette, three brushes
  (marker / pressure pen / highlighter), an adjustable brush size, plus undo,
  clear and "save PNG". Every stroke is meshed by Google Ink in WebAssembly and
  filled on a 2D canvas via ink-wasm's Canvas2D backend.

  Unlike examples/index.html (which renders a single live stroke), a paint app
  has to *accumulate* drawings: we keep a list of committed strokes — each with
  its own cached mesh and color — and redraw the whole stack every frame, with
  the in-progress stroke on top. Undo pops the stack; clear empties it.

  Run `pnpm serve` (copies the built dist/ into examples/ and serves it),
  then open http://localhost:3000/paint.html
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ink-wasm — Paint</title>
    <style>
      :root {
        --bg: #1e1f26;
        --panel: #282a36;
        --panel-2: #313444;
        --line: #3c3f52;
        --text: #e6e7ee;
        --muted: #9a9db0;
        --accent: #7aa2f7;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        font:
          14px/1.4 system-ui,
          sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
      }
      header h1 {
        font-size: 15px;
        font-weight: 600;
        margin: 0;
      }
      header .status {
        color: var(--muted);
        font-size: 12px;
      }
      .app {
        flex: 1;
        display: flex;
        min-height: 0;
      }
      .toolbar {
        width: 220px;
        flex-shrink: 0;
        padding: 16px;
        border-right: 1px solid var(--line);
        background: var(--panel);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 22px;
      }
      .group > .label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 10px;
      }

      /* Palette */
      .swatches {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
      .swatch {
        aspect-ratio: 1;
        border-radius: 6px;
        border: 2px solid transparent;
        cursor: pointer;
        padding: 0;
        outline: none;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.25);
      }
      .swatch[aria-pressed="true"] {
        border-color: var(--text);
      }
      .custom-color {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
      }
      .custom-color input {
        width: 28px;
        height: 28px;
        padding: 0;
        border: none;
        background: none;
        cursor: pointer;
      }

      /* Brushes */
      .brushes {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .brush {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
        text-align: left;
        font: inherit;
      }
      .brush[aria-pressed="true"] {
        border-color: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      .brush .name {
        font-weight: 600;
      }
      .brush .desc {
        display: block;
        font-size: 11px;
        color: var(--muted);
      }

      /* Size */
      .size-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .size-row input {
        flex: 1;
      }
      .size-row .value {
        width: 34px;
        text-align: right;
        font-variant-numeric: tabular-nums;
        color: var(--muted);
      }
      .preview {
        height: 40px;
        margin-top: 10px;
        border-radius: 8px;
        background: var(--panel-2);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .preview .dot {
        border-radius: 50%;
      }

      /* Actions */
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }
      .actions button {
        padding: 9px 10px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
        font: inherit;
      }
      .actions button:hover {
        border-color: var(--accent);
      }
      .actions button.wide {
        grid-column: 1 / -1;
      }

      /* Canvas */
      .stage {
        flex: 1;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: repeating-conic-gradient(
            #00000010 0% 25%,
            transparent 0% 50%
          )
          50% / 24px 24px;
      }
      canvas {
        background: #ffffff;
        border-radius: 8px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
        touch-action: none;
        cursor: crosshair;
        max-width: 100%;
        max-height: 100%;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>ink-wasm · Paint</h1>
      <span class="status" id="status">loading wasm…</span>
    </header>

    <div class="app">
      <aside class="toolbar">
        <div class="group">
          <div class="label">Palette</div>
          <div class="swatches" id="swatches"></div>
          <label class="custom-color">
            <input type="color" id="customColor" value="#7aa2f7" />
            custom color
          </label>
        </div>

        <div class="group">
          <div class="label">Brush</div>
          <div class="brushes" id="brushes"></div>
        </div>

        <div class="group">
          <div class="label">Size</div>
          <div class="size-row">
            <input type="range" id="size" min="1" max="40" step="1" value="8" />
            <span class="value" id="sizeValue">8</span>
          </div>
          <div class="preview"><span class="dot" id="previewDot"></span></div>
        </div>

        <div class="group">
          <div class="label">Canvas</div>
          <div class="actions">
            <button id="undo">↶ Undo</button>
            <button id="clear">Clear</button>
            <button id="save" class="wide">⬇ Save PNG</button>
          </div>
        </div>
      </aside>

      <main class="stage">
        <canvas id="c" width="900" height="600"></canvas>
      </main>
    </div>

    <script type="module">
      import { createInk, createCanvas2dBackend } from "./dist/index.js";

      // --- State -------------------------------------------------------------
      const PALETTE = [
        "#1a1a1a",
        "#e5484d",
        "#f76808",
        "#ffb224",
        "#46a758",
        "#12a594",
        "#0091ff",
        "#3e63dd",
        "#8e4ec6",
        "#e93d82",
        "#7a7a7a",
        "#a18072",
        "#643eb8",
        "#0d74ce",
        "#218358",
      ];

      // Each brush family the wasm engine ships, with an opacity that suits it.
      // The highlighter is translucent so overlapping strokes build up like a
      // real marker; the pens are opaque.
      const BRUSHES = [
        { id: "marker", name: "Marker", desc: "even, opaque ink", alpha: 1 },
        {
          id: "pressure_pen",
          name: "Pressure Pen",
          desc: "speed-tapered nib",
          alpha: 1,
        },
        {
          id: "highlighter",
          name: "Highlighter",
          desc: "translucent wash",
          alpha: 0.4,
        },
      ];

      const state = {
        color: PALETTE[6], // hex
        brush: "marker",
        size: 8,
      };

      // Committed strokes: each caches its generated mesh + render color so we
      // never re-mesh the whole drawing — only the live stroke is re-meshed as
      // the pointer moves.
      const strokes = [];

      let ink = null;
      let backend = null;
      const canvas = document.getElementById("c");
      const status = document.getElementById("status");

      // --- Color helpers -----------------------------------------------------
      function hexToRgb(hex) {
        const n = parseInt(hex.slice(1), 16);
        return {
          r: ((n >> 16) & 255) / 255,
          g: ((n >> 8) & 255) / 255,
          b: (n & 255) / 255,
        };
      }

      // Resolve the full rgba (0..1) the engine and backend should use, folding
      // in the active brush's opacity.
      function activeColor() {
        const { r, g, b } = hexToRgb(state.color);
        const alpha = BRUSHES.find((x) => x.id === state.brush).alpha;
        return { r, g, b, a: alpha };
      }

      // --- Rendering ---------------------------------------------------------
      // Repaint everything: all committed strokes (bottom-up) then the live one.
      function render(liveMesh = null, liveColor = null) {
        backend.clear();
        for (const s of strokes) backend.drawMesh(s.mesh, s.color);
        if (liveMesh) backend.drawMesh(liveMesh, liveColor);
        backend.present();
      }

      function meshFor(points, color) {
        return ink.generateStrokeMesh(
          points,
          state.brush,
          color.r,
          color.g,
          color.b,
          color.a,
          state.size,
          0.1, // simplification tolerance
        );
      }

      // --- Pointer drawing ---------------------------------------------------
      let points = [];
      let t0 = 0;
      let drawing = false;
      // The brush/color/size are captured at pointerdown so changing tools
      // mid-stroke can't corrupt the stroke in flight.
      let strokeColor = null;
      let strokeBrush = null;

      function pos(e) {
        const r = canvas.getBoundingClientRect();
        // The canvas is drawn at its intrinsic resolution but may be scaled to
        // fit the stage, so map client coords back into canvas pixels.
        return {
          x: ((e.clientX - r.left) / r.width) * canvas.width,
          y: ((e.clientY - r.top) / r.height) * canvas.height,
        };
      }

      canvas.addEventListener("pointerdown", (e) => {
        if (!ink) return;
        drawing = true;
        canvas.setPointerCapture(e.pointerId);
        strokeColor = activeColor();
        strokeBrush = state.brush;
        points = [];
        t0 = performance.now();
        const p = pos(e);
        points.push({ x: p.x, y: p.y, t: 0, pressure: e.pressure || 0.5 });
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!drawing) return;
        const p = pos(e);
        points.push({
          x: p.x,
          y: p.y,
          t: (performance.now() - t0) / 1000,
          pressure: e.pressure || 0.5,
        });
        if (points.length < 2) return;
        const mesh = meshFor(points, strokeColor);
        if (mesh) render(mesh, strokeColor);
      });

      function finishStroke() {
        if (!drawing) return;
        drawing = false;
        if (points.length >= 2) {
          const mesh = meshFor(points, strokeColor);
          if (mesh) strokes.push({ mesh, color: strokeColor });
        }
        points = [];
        render();
        updateStatus();
      }

      canvas.addEventListener("pointerup", finishStroke);
      canvas.addEventListener("pointercancel", finishStroke);

      // --- Toolbar wiring ----------------------------------------------------
      function buildPalette() {
        const host = document.getElementById("swatches");
        for (const hex of PALETTE) {
          const b = document.createElement("button");
          b.className = "swatch";
          b.style.background = hex;
          b.title = hex;
          b.setAttribute("aria-pressed", String(hex === state.color));
          b.addEventListener("click", () => selectColor(hex));
          host.appendChild(b);
        }
      }

      function selectColor(hex) {
        state.color = hex;
        document.getElementById("customColor").value = hex;
        for (const el of document.querySelectorAll(".swatch")) {
          el.setAttribute("aria-pressed", String(el.title === hex));
        }
        updatePreview();
      }

      function buildBrushes() {
        const host = document.getElementById("brushes");
        for (const br of BRUSHES) {
          const b = document.createElement("button");
          b.className = "brush";
          b.setAttribute("aria-pressed", String(br.id === state.brush));
          b.innerHTML = `<span><span class="name">${br.name}</span><span class="desc">${br.desc}</span></span>`;
          b.addEventListener("click", () => {
            state.brush = br.id;
            for (const el of host.children)
              el.setAttribute("aria-pressed", "false");
            b.setAttribute("aria-pressed", "true");
            updatePreview();
          });
          host.appendChild(b);
        }
      }

      function updatePreview() {
        const dot = document.getElementById("previewDot");
        const c = activeColor();
        const d = Math.max(4, Math.min(state.size * 1.4, 36));
        dot.style.width = dot.style.height = d + "px";
        dot.style.background = `rgba(${(c.r * 255) | 0},${(c.g * 255) | 0},${(c.b * 255) | 0},${c.a})`;
      }

      function updateStatus() {
        const tris = strokes.reduce((n, s) => n + s.mesh.triangleCount, 0);
        status.textContent =
          `${strokes.length} stroke${strokes.length === 1 ? "" : "s"} · ` +
          `${tris.toLocaleString()} triangles`;
      }

      const customColor = document.getElementById("customColor");
      customColor.addEventListener("input", (e) => selectColor(e.target.value));

      const sizeInput = document.getElementById("size");
      sizeInput.addEventListener("input", (e) => {
        state.size = +e.target.value;
        document.getElementById("sizeValue").textContent = state.size;
        updatePreview();
      });

      document.getElementById("undo").addEventListener("click", () => {
        strokes.pop();
        render();
        updateStatus();
      });
      document.getElementById("clear").addEventListener("click", () => {
        strokes.length = 0;
        render();
        updateStatus();
      });
      document.getElementById("save").addEventListener("click", () => {
        // Flatten onto white so the PNG isn't transparent where nothing was drawn.
        const out = document.createElement("canvas");
        out.width = canvas.width;
        out.height = canvas.height;
        const octx = out.getContext("2d");
        octx.fillStyle = "#ffffff";
        octx.fillRect(0, 0, out.width, out.height);
        octx.drawImage(canvas, 0, 0);
        const a = document.createElement("a");
        a.download = "ink-painting.png";
        a.href = out.toDataURL("image/png");
        a.click();
      });

      // --- Boot --------------------------------------------------------------
      buildPalette();
      buildBrushes();
      updatePreview();

      ink = await createInk();
      backend = createCanvas2dBackend(canvas);
      render();
      status.textContent = `${ink.version()} — pick a color and draw`;
    </script>
  </body>
</html>
